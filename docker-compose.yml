services:
  web:
    image: nginx:alpine
    networks:
      - network_public
    volumes:
      - ./public:/usr/share/nginx/html:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public

        - traefik.http.routers.dev-tech-front.rule=Host(`site.alfredonetodev.net`)
        - traefik.http.routers.dev-tech-front.entrypoints=websecure
        - traefik.http.routers.dev-tech-front.tls.certresolver=letsencryptresolver

        - traefik.http.services.dev-tech-front.loadbalancer.server.port=80

networks:
  network_public:
    external: true